# --- Tema Nude Dark ---
set -g status-bg '#1a1614'
set -g status-fg '#d6c4b6'
set -g status-left '#[fg=#e0b084,bg=#1a1614,bold] #S '
set -g status-right '#[fg=#c2a383,bg=#1a1614] %d/%m/%Y %H:%M '
set -g window-status-format '#[fg=#8099a6] #I:#W '
set -g window-status-current-format '#[fg=#e0b084,bold] #I:#W '

# Bordes de paneles (cuadro visible en split)
set -g pane-border-style fg='#26211e'
set -g pane-active-border-style fg='#e0b084'

# --- terminal & key handling ---
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:Tc"

set -s extended-keys off

# Modo vim
set -g mode-keys vi
if-shell 'uname | grep -q Darwin' \
  'bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"' \
  'bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "clip"'

# Keymaps
unbind C-b
set -g prefix C-a
bind C-a send-prefix

unbind %
unbind '"'
bind v split-window -h -c "#{pane_current_path}"
bind d split-window -v -c "#{pane_current_path}"

# Mouse support
set -g mouse on

# Ayuda visual siempre visible (atajos)
set -g @which-key "on"
set -g @which-key-show-keys "on"

# Status bar position
set -g status-position top

# Kill all sessions except current
bind K confirm-before -p "Kill all other sessions? (y/n)" "kill-session -a"

# Fix index
set -g base-index 1
setw -g pane-base-index 1

# Atajos directos tipo "pro" para splits rápidos
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# TPM init
run '~/.tmux/plugins/tpm/tpm'
